services:
  db:
    image: postgres:15
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_password
      POSTGRES_DB: my_database_name

  web:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: "db"
      DB_USER: "my_user"
      DB_PASSWORD: "my_password"
      DB_NAME: "my_database_name"